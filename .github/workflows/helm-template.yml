name: helm-template

# Sanity gate on the vendored sister-app-chart (US-0.6).
# If sister chart drifts upstream and the vendored snapshot becomes invalid,
# this catches it on the next PR.

on:
  push:
    paths:
      - 'server/vendored/sister-app-chart/**'
      - '.github/workflows/helm-template.yml'
  pull_request:
    paths:
      - 'server/vendored/sister-app-chart/**'
      - '.github/workflows/helm-template.yml'
  workflow_dispatch:

jobs:
  helm-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Render templates
        run: |
          helm template server/vendored/sister-app-chart > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml || { echo "empty render"; exit 1; }
          echo "OK ($(wc -l < /tmp/rendered.yaml) lines)"
