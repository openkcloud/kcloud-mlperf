name: runner-smoke

# US-0.4: minimum-viable workflow that proves the GitHub Actions runner is wired.
# Triggered on every push and PR. If this is green, runner provisioning works
# and downstream workflows (server-tests, web-build, helm-template) can be added.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ok:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Echo OK
        run: |
          echo "Runner OK"
          echo "GitHub workspace: $GITHUB_WORKSPACE"
          echo "Job: $GITHUB_JOB"
          echo "SHA: $GITHUB_SHA"
