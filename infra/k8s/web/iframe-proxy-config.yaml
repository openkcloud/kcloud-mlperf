# iframe proxy URL ConfigMap for the etri-llm-frontend bottom log/status panel.
#
# The frontend reads these keys to populate the embedded iframe URLs shown
# in the status/log panel. Values are placeholders — the cluster operator
# must fill in actual URLs matching the deployed Loki, Grafana, and backend
# endpoints before applying.
#
# How to apply:
#   1. Edit the values below with real cluster URLs.
#   2. kubectl apply -f k8s/web/iframe-proxy-config.yaml
#   3. Rolling-restart the frontend Deployment to pick up the new ConfigMap:
#      kubectl rollout restart deployment/etri-llm-frontend -n llm-evaluation
#
# Typical values:
#   loki_logs_iframe:
#     http://<node-ip>:30000/explore?...  (Grafana Loki explore panel, embed=true)
#   grafana_dashboard_iframe:
#     http://<node-ip>:30000/d/<dashboard-uid>/etri-llm-bench?kiosk
#   pod_log_stream_endpoint:
#     http://<node-ip>:30980/stream/logs  (etri-llm-backend SSE endpoint)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iframe-proxy-config
  namespace: llm-evaluation
  labels:
    app.kubernetes.io/name: etri-llm-frontend
    app.kubernetes.io/component: iframe-config
    app.kubernetes.io/managed-by: kubectl
data:
  # Grafana Loki Explore panel — embedded in the bottom log panel.
  # Replace <GRAFANA_HOST> and <GRAFANA_PORT> with actual values.
  # Append ?orgId=1&embed=true for iframe embedding.
  loki_logs_iframe: "http://<GRAFANA_HOST>:<GRAFANA_PORT>/explore?orgId=1&embed=true"

  # Grafana dashboard iframe for the ETRI LLM benchmark overview.
  # Replace <GRAFANA_HOST>, <GRAFANA_PORT>, and <DASHBOARD_UID> with actual values.
  grafana_dashboard_iframe: "http://<GRAFANA_HOST>:<GRAFANA_PORT>/d/<DASHBOARD_UID>/etri-llm-bench?kiosk&orgId=1"

  # etri-llm-backend SSE pod log stream endpoint.
  # Exposed via NodePort 30980 on the backend service.
  # Replace <NODE_IP> with the IP of any worker node (node2 or node3 recommended).
  pod_log_stream_endpoint: "http://<NODE_IP>:30980/stream/logs"
