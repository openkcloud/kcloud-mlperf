apiVersion: batch/v1
kind: Job
metadata:
  name: mirror-mondrianai-to-ghcr
  namespace: llm-evaluation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: image-mirror
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: node2
      containers:
      - name: crane
        image: gcr.io/go-containerregistry/crane:debug
        env:
        - name: DOCKER_CONFIG_JSON
          valueFrom:
            secretKeyRef:
              name: image-pull-secret
              key: .dockerconfigjson
        command: ["/busybox/sh","-c"]
        args:
        - |
          set -ex
          mkdir -p /root/.docker
          printf '%s' "$DOCKER_CONFIG_JSON" > /root/.docker/config.json
          # ETRI takeover (2026-05-12): destination registry migrated from
          # jungwooshim Docker Hub to ETRI-owned GHCR org `ghcr.io/etri-llm`.
          # Note: jungwooshim/etri-llm-k8s-operator:v1.0.1 was already migrated
          # earlier and is not re-mirrored here. The api image (k8s-api) is
          # still under the legacy mondrianai source — included for completeness;
          # remove the line once k8s-api is re-published under ghcr.io/etri-llm.
          for pair in \
            "mondrianai/etri-llm-k8s-api:v1.0.0       ghcr.io/etri-llm/etri-llm-k8s-api:v1.0.0" \
            "mondrianai/etri-llm-mlperf:v0.2          ghcr.io/etri-llm/etri-llm-mlperf:v0.2" \
            "mondrianai/etri-llm-mmlu-pro:v0.2        ghcr.io/etri-llm/etri-llm-mmlu-pro:v0.2" ; do
            src=$(echo "$pair" | awk '{print $1}')
            dst=$(echo "$pair" | awk '{print $2}')
            echo "=== mirror $src -> $dst ==="
            crane copy "$src" "$dst"
          done
          echo "=== done ==="
