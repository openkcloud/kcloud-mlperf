{{- with .Values }}
# RBAC for the etri-llm-backend ServiceAccount (default in {{ .global.namespace }})
# to read Kubernetes nodes for the DeviceRegistryService.
# Cluster-scoped — must be granted by an admin during initial install.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etri-llm-backend-device-registry
  labels:
    app.kubernetes.io/name: etri-llm-backend
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etri-llm-backend-device-registry
  labels:
    app.kubernetes.io/name: etri-llm-backend
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etri-llm-backend-device-registry
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .global.namespace }}
{{- end }}
