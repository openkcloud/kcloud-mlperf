apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: disk-pressure-warnings
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: disk-pressure
      interval: 60s
      rules:
        - alert: KubeletDiskPressureWarning
          expr: >
            (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) > 0.75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node disk usage above 75% ({{ $labels.instance }})"
            description: >
              Node {{ $labels.instance }} root filesystem usage is
              {{ printf "%.1f" (mul $value 100) }}%, which is above the 75%
              early-warning threshold. The kubelet eviction threshold is 85%.
              Immediate action required to avoid KubeletDiskPressure and pod
              eviction. See runbook:
              https://github.com/etri-llm/etri-llm/blob/main/.omc/runbooks/disk-pressure-prevention.md
