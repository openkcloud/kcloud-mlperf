# Source ConfigMap consumed by the env-injector Kyverno policy
# (kyverno-policy.yaml, context.configMap=etri-llm-build-info).
#
# Populate this ConfigMap during your release pipeline (see README,
# section "How IMAGE_DIGEST and GIT_COMMIT_SHA flow"). The values shown
# below are illustrative defaults so the policy resolves to "unknown"
# rather than failing if the pipeline forgets to populate them.
#
# Recommended population (in CI/CD):
#   kubectl -n llm-evaluation create configmap etri-llm-build-info \
#     --from-literal=IMAGE_DIGEST="$(skopeo inspect docker://...| jq -r .Digest)" \
#     --from-literal=GIT_COMMIT_SHA="$(git rev-parse HEAD)" \
#     --from-literal=HELM_RELEASE_NAME="etri-llm-app" \
#     --from-literal=HELM_CHART_VERSION="$(helm show chart ... | yq .version)" \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: etri-llm-build-info
  namespace: llm-evaluation
  labels:
    app.kubernetes.io/name: etri-admission-webhook
    app.kubernetes.io/component: build-info
  annotations:
    etri.llm/note: |
      Overwritten by the release pipeline. Defaults below are placeholders
      so the env-injector policy never fails to resolve a context lookup.
data:
  IMAGE_DIGEST: "unknown"
  GIT_COMMIT_SHA: "unknown"
  HELM_RELEASE_NAME: ""
  HELM_CHART_VERSION: ""
