# RBAC for the env-injection workflow.
#
# Kyverno itself ships ServiceAccounts, ClusterRoles, and Bindings via its
# Helm chart (see deployment.yaml for chart values). The resources defined
# here are SUPPLEMENTAL: they grant the Kyverno background controller and
# admission controller the ability to read the `etri-llm-build-info`
# ConfigMap (in the llm-evaluation namespace) so the mutation policy can
# pull IMAGE_DIGEST and GIT_COMMIT_SHA values from it via context.configMap.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etri-webhook-config-reader
  namespace: llm-evaluation
  labels:
    app.kubernetes.io/name: etri-admission-webhook
    app.kubernetes.io/component: rbac
---
# Allow Kyverno to GET the build-info ConfigMap referenced by the policy.
# Kyverno already has broad read RBAC by default, but in clusters where
# its ClusterRole has been narrowed (defense-in-depth), this binding
# guarantees the lookup succeeds.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etri-build-info-reader
  namespace: llm-evaluation
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["etri-llm-build-info"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etri-build-info-reader-kyverno
  namespace: llm-evaluation
subjects:
  - kind: ServiceAccount
    name: kyverno-admission-controller
    namespace: kyverno
  - kind: ServiceAccount
    name: kyverno-background-controller
    namespace: kyverno
roleRef:
  kind: Role
  name: etri-build-info-reader
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-wide read on namespaces is required so Kyverno can resolve the
# llm-evaluation namespaceSelector in the MutatingWebhookConfiguration.
# (Kyverno's default ClusterRole already includes this; defined here as a
# documented contract for narrowed-RBAC clusters.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etri-webhook-namespace-reader
  labels:
    app.kubernetes.io/name: etri-admission-webhook
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etri-webhook-namespace-reader-kyverno
  labels:
    app.kubernetes.io/name: etri-admission-webhook
subjects:
  - kind: ServiceAccount
    name: kyverno-admission-controller
    namespace: kyverno
roleRef:
  kind: ClusterRole
  name: etri-webhook-namespace-reader
  apiGroup: rbac.authorization.k8s.io
