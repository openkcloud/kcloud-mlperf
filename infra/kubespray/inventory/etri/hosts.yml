      ansible_become_password: "{{ lookup('env', 'SUDO_PASS') }}"
      node_labels:
        rebellions.ai/npu: "true"
        accelerator-type: "npu"
        npu-vendor: "rebellions"
        npu-model: "atomplus"
        accelerator-count: "2"

