# FuriosaAI RNGD Device Plugin DaemonSet.
#
# Exposes the furiosa.ai/rngd extended resource on node4.
# Actual production install is via helm (furiosa/furiosa-device-plugin) in
# kubernetes/08-deploy-furiosa-npu.sh. This raw DaemonSet is provided for
# environments without Helm or for explicit GitOps management.
#
# NOTE: Pin to a specific image tag in production.
# e.g. furiosaai/k8s-device-plugin:v1.0.0  (check https://hub.docker.com/r/furiosaai/k8s-device-plugin)
#
# Node requirements (node4):
#   - furiosa-driver-rngd installed on the host
#   - furiosa-cdi configured and containerd CDI feature gate enabled
#   - Node labels: npu-vendor=furiosa, npu-model=rngd  (set by feature-discovery or manually)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: furiosa-rngd-device-plugin
  namespace: furiosa-system
  labels:
    app.kubernetes.io/name: furiosa-rngd-device-plugin
    app.kubernetes.io/component: device-plugin
    app.kubernetes.io/managed-by: kubectl
    etri/npu-vendor: furiosa
    etri/npu-model: rngd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: furiosa-rngd-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: furiosa-rngd-device-plugin
        app.kubernetes.io/component: device-plugin
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - key: furiosa.ai/rngd
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        npu-vendor: furiosa
        npu-model: rngd
      containers:
        - name: furiosa-device-plugin
          # NOTE: pin to a specific tag in production
          image: furiosaai/k8s-device-plugin:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
            - name: furiosa-socket
              mountPath: /var/run/furiosa
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: furiosa-socket
          hostPath:
            path: /var/run/furiosa
            type: DirectoryOrCreate
