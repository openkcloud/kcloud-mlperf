{{- with .Values }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: etri-llm-k8s-operator
    app.kubernetes.io/managed-by: kustomize
  name: etri-llm-k8s-operator-rolebinding  
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etri-llm-k8s-operator-role
subjects:
- kind: ServiceAccount
  name: {{ .components.etriLLMOperator.metadata.name }}
  namespace: {{ .global.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: etri-llm-k8s-operator
    app.kubernetes.io/managed-by: kustomize
  name: leader-election-rolebinding
  namespace: {{ .global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ .components.etriLLMOperator.metadata.name }}
  namespace: {{ .global.namespace }}
{{- end }}
