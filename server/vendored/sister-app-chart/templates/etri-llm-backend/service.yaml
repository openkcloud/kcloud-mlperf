{{- with .Values }}
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: etri-llm-backend
  name: {{ .components.etriLLMBackend.metadata.name }}-service
  namespace: {{ .global.namespace }}
spec:
  ports:
  - name: backend
    port: {{ .components.etriLLMBackend.containers.containerPort }}
    nodePort: 30980
    protocol: TCP
    targetPort: {{ .components.etriLLMBackend.containers.containerPort }}
  selector:
    app: {{ .components.etriLLMBackend.metadata.name }}
  type: NodePort
{{- end }}      
