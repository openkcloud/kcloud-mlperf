{{- with .Values }}
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: etri-llm-frontend
  name: {{ .components.etriLLMFrontend.metadata.name }}-service
  namespace: {{ .global.namespace }}
spec:
  type: NodePort
  ports:
  - name: frontend 
    port: {{ .components.etriLLMFrontend.containers.containerPort }}
    protocol: TCP
    targetPort: {{ .components.etriLLMFrontend.containers.containerPort }}
    nodePort: {{ .components.etriLLMFrontend.service.nodePort }}
  selector:
    app: {{ .components.etriLLMFrontend.metadata.name }}
{{- end }}      