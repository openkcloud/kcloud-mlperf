# Model Registry: LLM Model Profiles for ETRI Benchmark Cluster
#
# This registry defines all supported models with hardware compatibility,
# memory requirements, and deployment notes.
#
# Fields:
#   name: human-readable model identifier
#   hf_repo: Hugging Face model repository (e.g., meta-llama/Llama-3.1-8B-Instruct)
#   revision: git revision or tag (e.g., "main", "fp16", specific commit hash)
#   precision: quantization/precision format (fp32, fp16, bf16, fp8, int8, etc.)
#   state: deployment readiness (active, stable, experimental, planned)
#   memory_required_gb: weight memory per device (does NOT include KV cache or optimizer states)
#   accelerator_compatibility: map of accelerator type → {min_device_count, min_vram_per_device_gb, notes}
#   tensor_parallel_recommended: number of devices for tensor parallelism (0 = not recommended)
#   pipeline_parallel_recommended: number of stages for pipeline parallelism (0 = not recommended)
#   kv_cache_gb_estimate: approx KV cache per device at max_seq_len=2048, batch=1
#   max_seq_length: model max context window
#   description: brief usage note
#   deprecated: true if no longer recommended

models:
  - name: llama-3.1-8b-fp8
    state: active
    description: "Primary target model for ETRI benchmark: 8B parameters with FP8 quantization"
    hf_repo: meta-llama/Llama-3.1-8B-Instruct
    revision: "main"
    precision: fp8
    memory_required_gb: 8
    max_seq_length: 8192
    accelerator_compatibility:
      - type: gpu
        vendor: nvidia
        models: [L40, A40, A100-80G]
        min_device_count: 1
        min_vram_per_device_gb: 16
        notes: "L40 (48GB) and A40 (48GB) are tightly fit; A100-80G is comfortable"
      - type: npu
        vendor: furiosa
        models: [RNGD]
        min_device_count: 1
        min_vram_per_device_gb: 24
        notes: "RNGD has 24GB; FP8 weights (~8GB) + KV cache (~1GB at seq_len=2k) fits comfortably"
    tensor_parallel_recommended: 0
    pipeline_parallel_recommended: 0
    kv_cache_gb_estimate: 0.5
    download_url: "https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct"

  - name: llama-3.1-8b-bf16
    state: stable
    description: "Baseline 8B model: BF16 precision for reproducibility and accuracy reference"
    hf_repo: meta-llama/Llama-3.1-8B-Instruct
    revision: "main"
    precision: bf16
    memory_required_gb: 16
    max_seq_length: 8192
    accelerator_compatibility:
      - type: gpu
        vendor: nvidia
        models: [L40, A40, A100-80G]
        min_device_count: 1
        min_vram_per_device_gb: 24
        notes: "L40 and A40 are at capacity; A100-80G recommended"
      - type: npu
        vendor: furiosa
        models: [RNGD, Atom+]
        min_device_count: 1
        min_vram_per_device_gb: 24
        notes: "RNGD has exactly 24GB; tight fit with KV cache"
    tensor_parallel_recommended: 0
    pipeline_parallel_recommended: 0
    kv_cache_gb_estimate: 1.0
    download_url: "https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct"

  - name: llama-3.1-70b-fp8
    state: planned
    description: "Future target: 70B parameters with FP8 quantization. Requires tensor parallelism."
    hf_repo: meta-llama/Llama-3.1-70B-Instruct
    revision: "main"
    precision: fp8
    memory_required_gb: 70
    max_seq_length: 8192
    accelerator_compatibility:
      - type: gpu
        vendor: nvidia
        models: [L40, A100-80G]
        min_device_count: 4
        min_vram_per_device_gb: 48
        notes: "TP=4 across 4 devices: ~17.5GB weights/device + ~1GB KV cache. L40 48GB is MARGINAL; A100-80G is COMFORTABLE."
        marginal_devices: true
      - type: npu
        vendor: furiosa
        models: [RNGD]
        min_device_count: 4
        min_vram_per_device_gb: 24
        notes: "TP=4 across 4 RNGDs: ~17.5GB weights/device + ~1GB KV cache fits in 24GB. Currently only 1 RNGD in cluster; need +3."
    tensor_parallel_recommended: 4
    pipeline_parallel_recommended: 1
    kv_cache_gb_estimate: 1.0
    deployment_blocker: "Cluster has insufficient hardware. See 70b_readiness_report.md"
    download_url: "https://huggingface.co/meta-llama/Llama-3.1-70B-Instruct"

  - name: llama-3.1-70b-bf16
    state: planned
    description: "Future baseline: 70B with BF16 (not optimized). For research only."
    hf_repo: meta-llama/Llama-3.1-70B-Instruct
    revision: "main"
    precision: bf16
    memory_required_gb: 140
    max_seq_length: 8192
    accelerator_compatibility:
      - type: gpu
        vendor: nvidia
        models: [A100-80G]
        min_device_count: 4
        min_device_gpu_mem: 80
        min_vram_per_device_gb: 80
        notes: "TP=4 across 4 A100-80Gs: ~35GB weights/device + ~2GB KV cache. Tight fit; A100-80G required (L40 insufficient)."
      - type: npu
        vendor: furiosa
        models: [RNGD]
        min_device_count: 0
        notes: "BF16 on RNGD (24GB) is impossible. Not supported."
    tensor_parallel_recommended: 4
    pipeline_parallel_recommended: 1
    kv_cache_gb_estimate: 2.0
    deployment_blocker: "Not recommended for production. Use FP8 variant."
    download_url: "https://huggingface.co/meta-llama/Llama-3.1-70B-Instruct"

# Metadata and constraints
deployment_rules:
  fp8_quantization_note: "All FP8 models use vLLM's quantization. Requires INT4 or FP8 kernel support."
  tensor_parallel_nccl_requirement: "Cross-node TP requires low-latency network (10+ Gbps). Cluster ethernet ~10-25 Gbps."
  kv_cache_provisioning: "KV cache grows with batch_size and seq_len. Monitor for OOM on small devices."
  active_models:
    - llama-3.1-8b-fp8
    - llama-3.1-8b-bf16
  future_roadmap:
    - llama-3.1-70b-fp8 (requires +3 RNGD devices or 4x A100-80G)
    - llama-3.1-70b-bf16 (research only; A100-80G required)
