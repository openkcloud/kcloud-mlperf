# Rack4-independent storage + PostgreSQL for the official ETRI WebUI (kcloud-tool ns).
# Ceph-backed PVCs (no host change). Postgres = fresh, in-ns, new random pw (Secret created imperatively).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kcloud-tool
  labels: { app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: general
  resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-nfs-pvc
  namespace: kcloud-tool
  labels: { app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: general-multi-attach
  resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dataset-nfs-pvc
  namespace: kcloud-tool
  labels: { app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: general-multi-attach
  resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: results-nfs-pvc
  namespace: kcloud-tool
  labels: { app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: general-multi-attach
  resources: { requests: { storage: 20Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etri-llm-db
  namespace: kcloud-tool
  labels: { app.kubernetes.io/name: etri-llm-db, app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: etri-llm-db }
  template:
    metadata:
      labels: { app: etri-llm-db, app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
    spec:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - { name: postgres, containerPort: 5432 }
          envFrom:
            - secretRef: { name: etri-llm-db }
          env:
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U postgres -d llmEvaluationDB || pg_isready -U postgres"] }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket: { port: 5432 }
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: pgdata
          persistentVolumeClaim: { claimName: postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: etri-llm-db
  namespace: kcloud-tool
  labels: { app.kubernetes.io/name: etri-llm-db, app.kubernetes.io/part-of: kcloud-tool, app.kubernetes.io/managed-by: kcloud-tool, kcloud-tool.rack4/group: official-webui }
spec:
  type: ClusterIP
  selector: { app: etri-llm-db }
  ports:
    - { name: postgres, port: 5432, targetPort: 5432, protocol: TCP }
