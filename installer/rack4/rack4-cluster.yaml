# Rack4 (kcloud-tool) device inventory — consumed by backend DeviceRegistryService
# as declared-accelerator source (shown even when k8s device-plugins are absent).
# Built from the Jun-8 read-only accelerator inventory of the Rack4 cluster.
# app.kubernetes.io/managed-by: kcloud-tool
cluster_name: kcloud-tool
kubeconfig: ~/.kube/config
ssh:
  default_port: 22
  npu_port: 22
control_plane:
  - name: master1
    role: master
    accelerator: { type: cpu, vendor: intel, count: 0 }
    ssh: { host: 172.29.236.151, port: 22 }
  - name: master2
    role: master
    accelerator: { type: cpu, vendor: intel, count: 0 }
    ssh: { host: 172.29.236.152, port: 22 }
  - name: master3
    role: master
    accelerator: { type: cpu, vendor: intel, count: 0 }
    ssh: { host: 172.29.236.153, port: 22 }
workers:
  - name: compute1
    role: worker
    accelerator: { type: npu, vendor: furiosa, model: RNGD, count: 1 }
    ssh: { host: 172.29.236.155, port: 22 }
  - name: compute5
    role: worker
    accelerator: { type: gpu, vendor: nvidia, model: NVIDIA-L40S, count: 1 }
    ssh: { host: 172.29.236.159, port: 22 }
  - name: compute6
    role: worker
    accelerator: { type: gpu, vendor: nvidia, model: NVIDIA-L40S, count: 1 }
    ssh: { host: 172.29.236.160, port: 22 }
  - name: mlt
    role: worker
    accelerator: { type: cpu, vendor: intel, count: 0 }
    ssh: { host: 172.29.236.165, port: 22 }
