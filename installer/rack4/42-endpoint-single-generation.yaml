# B-2 — single generation test against the RNGD endpoint (ONE /v1/chat/completions).
# CPU-only client. Reuses SA kcloud-mlperf-sa + PVC kcloud-mlperf-results (unmodified). New ConfigMap + Job.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kcloud-mlperf-singlegen-scripts
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: bench
data:
  gen.py: |
    import os, sys, json, time, urllib.request, urllib.error

    ENDPOINT = os.environ.get("ENDPOINT_URL", "http://10.254.202.114:8000")
    MODEL = os.environ.get("MODEL_ID", "meta-llama/Llama-3.1-8B-Instruct")
    PROMPT = os.environ.get("PROMPT", "Reply with exactly one word: OK.")
    MAX_TOKENS = int(os.environ.get("MAX_TOKENS", "16"))
    TIMEOUT = float(os.environ.get("REQUEST_TIMEOUT", "30"))
    RESULTS_DIR = "/mnt/datasets/endpoint-single-generation"
    POD = os.environ.get("POD_NAME", "unknown")
    NODE = os.environ.get("NODE_NAME", "unknown")

    url = ENDPOINT.rstrip("/") + "/v1/chat/completions"
    payload = {
        "model": MODEL,
        "messages": [{"role": "user", "content": PROMPT}],
        "max_tokens": MAX_TOKENS,
        "temperature": 0,
        "stream": False,
    }
    out = {
        "test": "endpoint-single-generation", "node": NODE, "pod": POD,
        "endpoint": url, "model": MODEL, "prompt": PROMPT,
        "request_count": 1, "max_tokens": MAX_TOKENS, "temperature": 0, "stream": False,
    }
    data = json.dumps(payload).encode("utf-8")
    t0 = time.perf_counter()
    try:
        req = urllib.request.Request(url, data=data, method="POST",
            headers={"Content-Type": "application/json", "Accept": "application/json"})
        with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
            body = resp.read().decode("utf-8", "replace")
            code = resp.getcode()
        dt = time.perf_counter() - t0
        out["http_code"] = code
        out["latency_s"] = round(dt, 4)
        out["success"] = (code == 200)
        out["error_count"] = 0 if code == 200 else 1
        try:
            parsed = json.loads(body)
            choice = (parsed.get("choices") or [{}])[0]
            text = ((choice.get("message") or {}).get("content")) or ""
            out["generated_text"] = text
            out["output_chars"] = len(text)
            usage = parsed.get("usage") or {}
            out["prompt_tokens"] = usage.get("prompt_tokens")
            out["completion_tokens"] = usage.get("completion_tokens")
            out["total_tokens"] = usage.get("total_tokens")
            ct = usage.get("completion_tokens")
            if ct and dt > 0:
                out["tokens_per_s"] = round(ct / dt, 2)
            if dt > 0:
                out["chars_per_s"] = round(len(text) / dt, 2)
        except Exception as e:
            out["parse_error"] = repr(e); out["raw_body_head"] = body[:500]
            out["success"] = False; out["error_count"] = 1
    except urllib.error.HTTPError as e:
        out["success"] = False; out["error_count"] = 1; out["http_code"] = e.code
        out["error"] = "HTTPError %s" % e.code
        try: out["error_body_head"] = e.read().decode("utf-8", "replace")[:300]
        except Exception: pass
        out["latency_s"] = round(time.perf_counter() - t0, 4)
    except Exception as e:
        out["success"] = False; out["error_count"] = 1
        out["error"] = repr(e); out["latency_s"] = round(time.perf_counter() - t0, 4)

    try:
        os.makedirs(RESULTS_DIR, exist_ok=True)
        path = os.path.join(RESULTS_DIR, "result-%s.json" % POD)
        with open(path, "w") as f:
            json.dump(out, f, indent=2)
        out["persisted_path"] = path
        out["persisted_verified"] = os.path.exists(path)
    except Exception as e:
        out["persisted_verified"] = False; out["persist_error"] = repr(e)

    print(json.dumps(out, indent=2))
    sys.exit(0 if out.get("success") else 1)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kcloud-mlperf-endpoint-single-generation
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: bench
spec:
  backoffLimit: 0
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kcloud-tool
        app.kubernetes.io/instance: kcloud-mlperf
        app.kubernetes.io/part-of: kcloud-tool
        app.kubernetes.io/managed-by: kcloud-tool
        app.kubernetes.io/component: bench
    spec:
      restartPolicy: Never
      serviceAccountName: kcloud-mlperf-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["mlt"]
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["compute1"]
            - weight: 60
              preference:
                matchExpressions:
                  - key: hardware
                    operator: NotIn
                    values: ["nvidia-gpu"]
      containers:
        - name: singlegen
          image: docker.io/library/python:3.11-slim@sha256:a3ab0b966bc4e91546a033e22093cb840908979487a9fc0e6e38295747e49ac0
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/gen.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: ENDPOINT_URL
              value: "http://10.254.202.114:8000"
            - name: MODEL_ID
              value: "meta-llama/Llama-3.1-8B-Instruct"
            - name: PROMPT
              value: "Reply with exactly one word: OK."
            - name: MAX_TOKENS
              value: "16"
            - name: REQUEST_TIMEOUT
              value: "30"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - name: results
              mountPath: /mnt/datasets
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: kcloud-mlperf-results
        - name: scripts
          configMap:
            name: kcloud-mlperf-singlegen-scripts
        - name: tmp
          emptyDir: {}
