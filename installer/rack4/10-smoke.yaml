apiVersion: v1
kind: ServiceAccount
metadata:
  name: kcloud-mlperf-sa
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kcloud-mlperf-role
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kcloud-mlperf-rolebinding
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kcloud-mlperf-role
subjects:
  - kind: ServiceAccount
    name: kcloud-mlperf-sa
    namespace: kcloud-tool
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kcloud-mlperf-bench-scripts
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
data:
  smoke.py: |
    import os, sys, platform, shutil, json
    MNT = "/mnt/datasets"
    report = {
        "smoke": "kcloud-tool",
        "python": sys.version.split()[0],
        "platform": platform.platform(),
        "node": os.environ.get("NODE_NAME", "?"),
        "pod": os.environ.get("POD_NAME", "?"),
    }
    testfile = os.path.join(MNT, "kcloud-smoke.txt")
    marker = "kcloud-tool smoke ok"
    try:
        with open(testfile, "w") as f:
            f.write(marker)
        with open(testfile) as f:
            assert f.read() == marker
        _, _, free = shutil.disk_usage(MNT)
        report["pvc_writable"] = True
        report["pvc_free_gib"] = round(free / 2**30, 2)
        os.remove(testfile)
    except Exception as e:
        report["pvc_writable"] = False
        report["error"] = repr(e)
    print(json.dumps(report, indent=2))
    sys.exit(0 if report.get("pvc_writable") else 1)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kcloud-mlperf-results
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: general
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kcloud-mlperf-smoke
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kcloud-tool
        app.kubernetes.io/instance: kcloud-mlperf
        app.kubernetes.io/part-of: kcloud-tool
        app.kubernetes.io/managed-by: kcloud-tool
        app.kubernetes.io/component: smoke
    spec:
      restartPolicy: Never
      serviceAccountName: kcloud-mlperf-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["mlt"]
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["compute1"]
            - weight: 60
              preference:
                matchExpressions:
                  - key: hardware
                    operator: NotIn
                    values: ["nvidia-gpu"]
      containers:
        - name: smoke
          image: docker.io/library/python:3.11-slim@sha256:a3ab0b966bc4e91546a033e22093cb840908979487a9fc0e6e38295747e49ac0
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/smoke.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: results
              mountPath: /mnt/datasets
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: kcloud-mlperf-results
        - name: scripts
          configMap:
            name: kcloud-mlperf-bench-scripts
        - name: tmp
          emptyDir: {}
