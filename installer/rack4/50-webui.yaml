apiVersion: v1
kind: ConfigMap
metadata:
  name: kcloud-mlperf-webui-app
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: webui
data:
  webui.py: |
    import os, sys, json, time, math, threading, urllib.request, urllib.error
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    LISTEN = ("0.0.0.0", 8080)
    RESULTS_DIR = "/mnt/datasets/webui-runs"
    DEFAULT_ENDPOINT = os.environ.get("ENDPOINT_URL", "http://10.254.202.114:8000")
    DEFAULT_MODEL = os.environ.get("MODEL_ID", "meta-llama/Llama-3.1-8B-Instruct")
    NODE = os.environ.get("NODE_NAME", "?")
    POD = os.environ.get("POD_NAME", "?")

    # Hard safety caps — server-enforced, cannot be exceeded from the UI.
    CAP_REQUESTS = 5
    CAP_MAX_TOKENS = 32
    MIN_INTERVAL = 5.0
    CAP_TIMEOUT = 30.0

    try:
        os.makedirs(RESULTS_DIR, exist_ok=True)
    except Exception:
        pass
    _lock = threading.Lock()


    def percentile(vals, p):
        if not vals:
            return None
        s = sorted(vals)
        rank = max(1, math.ceil(p / 100.0 * len(s)))
        return round(s[rank - 1], 4)


    def run_benchmark(params):
        endpoint = (params.get("endpoint") or DEFAULT_ENDPOINT).rstrip("/")
        model = params.get("model") or DEFAULT_MODEL
        prompt = (params.get("prompt") or "Reply with exactly one word: OK.")[:500]
        rc = min(max(int(params.get("request_count", 5)), 1), CAP_REQUESTS)
        mt = min(max(int(params.get("max_tokens", 32)), 1), CAP_MAX_TOKENS)
        interval = max(float(params.get("interval", 6)), MIN_INTERVAL)
        timeout = min(float(params.get("timeout", 30)), CAP_TIMEOUT)
        url = endpoint + "/v1/chat/completions"
        reqs = []
        for i in range(rc):
            if i > 0:
                time.sleep(interval)
            body = json.dumps({"model": model, "messages": [{"role": "user", "content": prompt}],
                               "max_tokens": mt, "temperature": 0, "stream": False}).encode("utf-8")
            r = {"i": i}
            t0 = time.perf_counter()
            try:
                rq = urllib.request.Request(url, data=body, method="POST",
                    headers={"Content-Type": "application/json", "Accept": "application/json"})
                with urllib.request.urlopen(rq, timeout=timeout) as resp:
                    rb = resp.read().decode("utf-8", "replace")
                    code = resp.getcode()
                r["latency_s"] = round(time.perf_counter() - t0, 4)
                r["http_code"] = code
                r["ok"] = (code == 200)
                p = json.loads(rb)
                u = p.get("usage") or {}
                txt = ((p.get("choices") or [{}])[0].get("message") or {}).get("content") or ""
                r["completion_tokens"] = u.get("completion_tokens")
                r["output_chars"] = len(txt)
                if i == 0:
                    r["sample_output"] = txt[:200]
            except Exception as e:
                r["latency_s"] = round(time.perf_counter() - t0, 4)
                r["ok"] = False
                r["error"] = repr(e)
            reqs.append(r)
        oks = [r for r in reqs if r.get("ok")]
        lat = [r["latency_s"] for r in oks]
        toks = sum((r.get("completion_tokens") or 0) for r in oks)
        chars = sum((r.get("output_chars") or 0) for r in oks)
        sl = sum(lat)
        res = {
            "benchmark": "webui-endpoint-microbench", "node": NODE, "webui_pod": POD,
            "endpoint": url, "model": model, "prompt": prompt,
            "request_count": rc, "concurrency": 1, "interval_s": interval,
            "max_tokens": mt, "temperature": 0, "stream": False,
            "success_count": len(oks), "error_count": rc - len(oks),
            "latency_p50_s": percentile(lat, 50), "latency_p95_s": percentile(lat, 95),
            "latency_min_s": round(min(lat), 4) if lat else None,
            "latency_max_s": round(max(lat), 4) if lat else None,
            "total_completion_tokens": toks, "total_output_chars": chars,
            "tokens_per_s": round(toks / sl, 2) if (sl > 0 and toks) else None,
            "chars_per_s": round(chars / sl, 2) if sl > 0 else None,
            "ts": int(time.time()), "requests": reqs,
        }
        fn = os.path.join(RESULTS_DIR, "run-%d.json" % res["ts"])
        try:
            with _lock:
                with open(fn, "w") as f:
                    json.dump(res, f, indent=2)
            res["result_path"] = fn
            res["persisted"] = True
        except Exception as e:
            res["persisted"] = False
            res["persist_error"] = repr(e)
        return res


    PAGE = """<!doctype html>
    <html lang='en'><head><meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>kcloud-tool benchmark (Rack4)</title>
    <style>
     body{font-family:system-ui,Segoe UI,Roboto,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
     header{background:#1e293b;padding:14px 20px;border-bottom:1px solid #334155}
     h1{font-size:18px;margin:0}
     main{max-width:900px;margin:0 auto;padding:20px}
     .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:16px}
     label{display:block;font-size:12px;color:#94a3b8;margin:8px 0 2px}
     input,textarea{width:100%;box-sizing:border-box;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:6px;padding:8px}
     button{background:#2563eb;color:#fff;border:0;border-radius:6px;padding:10px 16px;font-size:14px;cursor:pointer;margin-top:12px}
     button:disabled{background:#475569;cursor:wait}
     pre{background:#0b1220;border:1px solid #334155;border-radius:6px;padding:12px;overflow:auto;font-size:12px}
     .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
     .kpi{background:#0b1220;border:1px solid #334155;border-radius:8px;padding:10px;text-align:center}
     .kpi b{display:block;font-size:20px;color:#38bdf8}
     .muted{color:#94a3b8;font-size:12px}
     .ok{color:#4ade80}.err{color:#f87171}
    </style></head>
    <body>
    <header><h1>kcloud-tool &mdash; RNGD endpoint benchmark (Rack4 / kcloud-tool ns)</h1></header>
    <main>
     <div class='card'>
      <div class='muted'>Safety caps (server-enforced): request_count&le;5, concurrency=1, QPS&le;0.2 (interval&ge;5s), max_tokens&le;32, temperature=0, stream=false, retry=0, timeout&le;30s.</div>
      <label>Endpoint</label><input id='endpoint' value='__ENDPOINT__'>
      <label>Model</label><input id='model' value='__MODEL__'>
      <label>Prompt</label><textarea id='prompt' rows='2'>Reply with exactly one word: OK.</textarea>
      <div class='grid'>
       <div><label>request_count (&le;5)</label><input id='request_count' type='number' value='5'></div>
       <div><label>max_tokens (&le;32)</label><input id='max_tokens' type='number' value='32'></div>
       <div><label>interval s (&ge;5)</label><input id='interval' type='number' value='6'></div>
      </div>
      <button id='run' onclick='runBench()'>Run benchmark</button>
      <span id='status' class='muted'></span>
     </div>
     <div class='card' id='summary' style='display:none'>
      <h3>Result</h3>
      <div class='grid'>
       <div class='kpi'><b id='k_succ'>-</b>success / total</div>
       <div class='kpi'><b id='k_p50'>-</b>latency p50 (s)</div>
       <div class='kpi'><b id='k_tps'>-</b>tokens/s</div>
      </div>
      <p class='muted'>sample output: <span id='k_out'></span></p>
      <pre id='raw'></pre>
     </div>
     <div class='card'>
      <h3>Saved runs <button onclick='listRuns()' style='margin:0 0 0 8px;padding:4px 10px'>refresh</button></h3>
      <pre id='runs'>(none loaded)</pre>
     </div>
    </main>
    <script>
    function gv(id){return document.getElementById(id).value;}
    function runBench(){
     var btn=document.getElementById('run'); btn.disabled=true;
     document.getElementById('status').textContent=' running (may take ~'+ (gv('request_count')*gv('interval')) +'s)...';
     var body={endpoint:gv('endpoint'),model:gv('model'),prompt:gv('prompt'),
      request_count:parseInt(gv('request_count')),max_tokens:parseInt(gv('max_tokens')),interval:parseFloat(gv('interval'))};
     fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.json();})
      .then(function(d){
        document.getElementById('summary').style.display='block';
        document.getElementById('k_succ').textContent=(d.success_count!=null?d.success_count:'?')+' / '+(d.request_count!=null?d.request_count:'?');
        document.getElementById('k_p50').textContent=(d.latency_p50_s!=null?d.latency_p50_s:'?');
        document.getElementById('k_tps').textContent=(d.tokens_per_s!=null?d.tokens_per_s:'?');
        var so=(d.requests&&d.requests[0]&&d.requests[0].sample_output)?d.requests[0].sample_output:'';
        document.getElementById('k_out').textContent=so;
        document.getElementById('raw').textContent=JSON.stringify(d,null,2);
        document.getElementById('status').textContent=(d.error_count===0?' done (ok)':' done (errors='+d.error_count+')');
        listRuns();
      })
      .catch(function(e){document.getElementById('status').textContent=' error: '+e;})
      .finally(function(){btn.disabled=false;});
    }
    function listRuns(){
     fetch('/api/runs').then(function(r){return r.json();}).then(function(d){
       document.getElementById('runs').textContent=(d.runs&&d.runs.length)?d.runs.join('\\n'):'(none)';
     });
    }
    listRuns();
    </script>
    </body></html>"""


    class H(BaseHTTPRequestHandler):
        def _send(self, code, ctype, body):
            if isinstance(body, str):
                body = body.encode("utf-8")
            self.send_response(code)
            self.send_header("Content-Type", ctype)
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *a):
            pass

        def do_GET(self):
            path = self.path.split("?", 1)[0]
            if path == "/healthz":
                return self._send(200, "text/plain", b"ok")
            if path == "/":
                html = PAGE.replace("__ENDPOINT__", DEFAULT_ENDPOINT).replace("__MODEL__", DEFAULT_MODEL)
                return self._send(200, "text/html; charset=utf-8", html)
            if path == "/api/config":
                return self._send(200, "application/json", json.dumps({
                    "endpoint": DEFAULT_ENDPOINT, "model": DEFAULT_MODEL,
                    "caps": {"request_count": CAP_REQUESTS, "max_tokens": CAP_MAX_TOKENS,
                             "concurrency": 1, "min_interval_s": MIN_INTERVAL, "timeout_s": CAP_TIMEOUT}}))
            if path == "/api/runs":
                try:
                    files = sorted([f for f in os.listdir(RESULTS_DIR) if f.endswith(".json")], reverse=True)
                except Exception:
                    files = []
                return self._send(200, "application/json", json.dumps({"runs": files}))
            if path.startswith("/api/run/"):
                name = os.path.basename(path[len("/api/run/"):])
                fp = os.path.join(RESULTS_DIR, name)
                if os.path.isfile(fp):
                    with open(fp) as f:
                        return self._send(200, "application/json", f.read())
                return self._send(404, "application/json", '{"error":"not found"}')
            return self._send(404, "text/plain", b"not found")

        def do_POST(self):
            if self.path.split("?", 1)[0] == "/api/run":
                try:
                    ln = int(self.headers.get("Content-Length", "0") or 0)
                except Exception:
                    ln = 0
                raw = self.rfile.read(ln) if ln else b"{}"
                try:
                    params = json.loads(raw or b"{}")
                except Exception:
                    params = {}
                try:
                    res = run_benchmark(params)
                    return self._send(200, "application/json", json.dumps(res))
                except Exception as e:
                    return self._send(500, "application/json", json.dumps({"error": repr(e)}))
            return self._send(404, "text/plain", b"not found")


    if __name__ == "__main__":
        srv = ThreadingHTTPServer(LISTEN, H)
        print("kcloud-tool webui listening on %s:%d (endpoint=%s model=%s)" % (LISTEN[0], LISTEN[1], DEFAULT_ENDPOINT, DEFAULT_MODEL), flush=True)
        srv.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kcloud-mlperf-webui
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: webui
spec:
  replicas: 1
  strategy:
    type: Recreate           # RWO PVC: avoid 2 pods mounting concurrently
  selector:
    matchLabels:
      app: kcloud-mlperf-webui
  template:
    metadata:
      labels:
        app: kcloud-mlperf-webui
        app.kubernetes.io/name: kcloud-tool
        app.kubernetes.io/instance: kcloud-mlperf
        app.kubernetes.io/part-of: kcloud-tool
        app.kubernetes.io/managed-by: kcloud-tool
        app.kubernetes.io/component: webui
    spec:
      serviceAccountName: kcloud-mlperf-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["mlt"]
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["compute1"]
            - weight: 60
              preference:
                matchExpressions:
                  - key: hardware
                    operator: NotIn
                    values: ["nvidia-gpu"]
      containers:
        - name: webui
          image: docker.io/library/python:3.11-slim@sha256:a3ab0b966bc4e91546a033e22093cb840908979487a9fc0e6e38295747e49ac0
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/webui.py"]
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: ENDPOINT_URL
              value: "http://10.254.202.114:8000"
            - name: MODEL_ID
              value: "meta-llama/Llama-3.1-8B-Instruct"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: results
              mountPath: /mnt/datasets
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: kcloud-mlperf-results
        - name: app
          configMap:
            name: kcloud-mlperf-webui-app
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kcloud-mlperf-webui
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: webui
spec:
  type: ClusterIP
  selector:
    app: kcloud-mlperf-webui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
