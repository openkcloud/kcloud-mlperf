apiVersion: v1
kind: Namespace
metadata:
  name: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: smoke
    # 자기 ns 한정 Pod Security 강화 (우리 pod 는 restricted 준수). 타 ns 무영향.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    # 의도적으로 istio-injection 라벨 미부여 → 사이드카 주입 없음
