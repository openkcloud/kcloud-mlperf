# B-4 — micro endpoint benchmark (<=5 sequential requests, QPS<=0.2). CPU-only client.
# Reuses SA kcloud-mlperf-sa + PVC kcloud-mlperf-results (unmodified). New ConfigMap + Job.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kcloud-mlperf-microbench-scripts
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: bench
data:
  microbench.py: |
    import os, sys, json, time, math, urllib.request, urllib.error

    ENDPOINT = os.environ.get("ENDPOINT_URL", "http://10.254.202.114:8000")
    MODEL = os.environ.get("MODEL_ID", "meta-llama/Llama-3.1-8B-Instruct")
    PROMPT = os.environ.get("PROMPT", "Write one short sentence about computers.")
    MAX_TOKENS = int(os.environ.get("MAX_TOKENS", "32"))
    REQUEST_COUNT = min(int(os.environ.get("REQUEST_COUNT", "5")), 5)
    INTERVAL = max(float(os.environ.get("REQUEST_INTERVAL", "6")), 5.0)
    TIMEOUT = float(os.environ.get("REQUEST_TIMEOUT", "30"))
    RESULTS_DIR = "/mnt/datasets/endpoint-microbench"
    POD = os.environ.get("POD_NAME", "unknown")
    NODE = os.environ.get("NODE_NAME", "unknown")

    url = ENDPOINT.rstrip("/") + "/v1/chat/completions"

    def percentile(vals, p):
        if not vals:
            return None
        s = sorted(vals)
        rank = max(1, math.ceil(p / 100.0 * len(s)))
        return round(s[rank - 1], 4)

    reqs = []
    for i in range(REQUEST_COUNT):
        if i > 0:
            time.sleep(INTERVAL)   # enforce QPS <= 0.2 (interval >= 5s)
        payload = {"model": MODEL, "messages": [{"role": "user", "content": PROMPT}],
                   "max_tokens": MAX_TOKENS, "temperature": 0, "stream": False}
        data = json.dumps(payload).encode("utf-8")
        r = {"i": i}
        t0 = time.perf_counter()
        try:
            req = urllib.request.Request(url, data=data, method="POST",
                headers={"Content-Type": "application/json", "Accept": "application/json"})
            with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
                body = resp.read().decode("utf-8", "replace")
                code = resp.getcode()
            r["latency_s"] = round(time.perf_counter() - t0, 4)
            r["http_code"] = code
            r["ok"] = (code == 200)
            parsed = json.loads(body)
            usage = parsed.get("usage") or {}
            text = ((parsed.get("choices") or [{}])[0].get("message") or {}).get("content") or ""
            r["completion_tokens"] = usage.get("completion_tokens")
            r["output_chars"] = len(text)
        except Exception as e:
            r["latency_s"] = round(time.perf_counter() - t0, 4)
            r["ok"] = False
            r["error"] = repr(e)
        reqs.append(r)

    oks = [r for r in reqs if r.get("ok")]
    lat = [r["latency_s"] for r in oks]
    toks = sum((r.get("completion_tokens") or 0) for r in oks)
    chars = sum((r.get("output_chars") or 0) for r in oks)
    sum_lat = sum(lat)
    out = {
        "benchmark": "endpoint-microbench", "node": NODE, "pod": POD,
        "endpoint": url, "model": MODEL, "prompt": PROMPT,
        "request_count": REQUEST_COUNT, "concurrency": 1, "interval_s": INTERVAL,
        "max_tokens": MAX_TOKENS, "temperature": 0, "stream": False,
        "success_count": len(oks), "error_count": REQUEST_COUNT - len(oks),
        "latency_p50_s": percentile(lat, 50), "latency_p95_s": percentile(lat, 95),
        "latency_min_s": round(min(lat), 4) if lat else None,
        "latency_max_s": round(max(lat), 4) if lat else None,
        "total_completion_tokens": toks, "total_output_chars": chars,
        "tokens_per_s": round(toks / sum_lat, 2) if (sum_lat > 0 and toks) else None,
        "chars_per_s": round(chars / sum_lat, 2) if sum_lat > 0 else None,
        "requests": reqs,
    }
    try:
        os.makedirs(RESULTS_DIR, exist_ok=True)
        path = os.path.join(RESULTS_DIR, "result-%s.json" % POD)
        with open(path, "w") as f:
            json.dump(out, f, indent=2)
        out["persisted_path"] = path
        out["persisted_verified"] = os.path.exists(path)
    except Exception as e:
        out["persisted_verified"] = False
        out["persist_error"] = repr(e)

    print(json.dumps(out, indent=2))
    sys.exit(0 if (len(oks) >= 1 and (REQUEST_COUNT - len(oks)) == 0) else 1)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kcloud-mlperf-endpoint-microbench
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: bench
spec:
  backoffLimit: 0
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kcloud-tool
        app.kubernetes.io/instance: kcloud-mlperf
        app.kubernetes.io/part-of: kcloud-tool
        app.kubernetes.io/managed-by: kcloud-tool
        app.kubernetes.io/component: bench
    spec:
      restartPolicy: Never
      serviceAccountName: kcloud-mlperf-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["mlt"]
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["compute1"]
            - weight: 60
              preference:
                matchExpressions:
                  - key: hardware
                    operator: NotIn
                    values: ["nvidia-gpu"]
      containers:
        - name: microbench
          image: docker.io/library/python:3.11-slim@sha256:a3ab0b966bc4e91546a033e22093cb840908979487a9fc0e6e38295747e49ac0
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/microbench.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: ENDPOINT_URL
              value: "http://10.254.202.114:8000"
            - name: MODEL_ID
              value: "meta-llama/Llama-3.1-8B-Instruct"
            - name: PROMPT
              value: "Write one short sentence about computers."
            - name: MAX_TOKENS
              value: "32"
            - name: REQUEST_COUNT
              value: "5"
            - name: REQUEST_INTERVAL
              value: "6"
            - name: REQUEST_TIMEOUT
              value: "30"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - name: results
              mountPath: /mnt/datasets
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: kcloud-mlperf-results
        - name: scripts
          configMap:
            name: kcloud-mlperf-microbench-scripts
        - name: tmp
          emptyDir: {}
