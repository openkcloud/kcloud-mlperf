data:
  cluster.yaml: "# Generated by kcloud-tool (Rack4 independent install)\n# app.kubernetes.io/managed-by:\
    \ kcloud-tool\ncluster_name: kcloud-tool\nkubeconfig: ~/.kube/config\nssh:\n \
    \ default_port: 22\n  npu_port: 22\ncontrol_plane: []\nworkers: []\n"
