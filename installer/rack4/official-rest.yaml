      labels:
        app: etri-llm-api
        app.kubernetes.io/instance: etri-llm-api
    spec:
      serviceAccountName: etri-llm-api
      terminationGracePeriodSeconds: 30
      containers:
      - name: etri-llm-api
        ports:
        - containerPort: 9090
          name: api
          protocol: TCP
        image: jungwooshim/etri-llm-k8s-api:v1.0.0
        envFrom:
        - secretRef:
            name: etri-llm-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etri-llm-operator
  namespace: kcloud-tool
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: etri-llm-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: etri-llm-operator
    app.kubernetes.io/part-of: kcloud-tool
    kcloud-tool.rack4/group: official-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etri-llm-operator
  template:
    metadata:
      labels:
        app: etri-llm-operator
        app.kubernetes.io/instance: etri-llm-operator
    spec:
      serviceAccountName: etri-llm-operator
      terminationGracePeriodSeconds: 30
      containers:
      - name: etri-llm-operator
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        image: jungwooshim/etri-llm-k8s-operator:v1.0.1
        envFrom:
        - secretRef:
            name: etri-llm-operator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
