apiVersion: v1
kind: ConfigMap
metadata:
  name: etri-llm-frontend-nginx-conf
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: etri-llm-frontend
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: kcloud-tool
    kcloud-tool.rack4/group: official-webui
data:
  default.conf: "server {\n    listen 5173;\n    server_name _;\n    root /usr/share/nginx/html;\n\
    \    index index.html;\n\n    # Correct-prefix calls: pass through.\n    location\
    \ /api/ {\n        proxy_pass http://etri-llm-backend-service.kcloud-tool.svc.cluster.local:9999/api/;\n\
    \        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n     \
    \   proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For\
    \ $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n\
    \        proxy_set_header Connection \"\";\n        proxy_buffering off;\n   \
    \     proxy_cache off;\n        proxy_read_timeout 1h;\n        proxy_send_timeout\
    \ 1h;\n        chunked_transfer_encoding off;\n    }\n\n    # Frontend code calls\
    \ some backend endpoints WITHOUT the /api prefix\n    # (mp-exam/list, npu-eval/list,\
    \ realtime/exams, comparison/list, etc.).\n    # Rewrite those to /api/<prefix>/...\
    \ so the backend's setGlobalPrefix\n    # is honored. SPA navigation requests\
    \ (Accept: text/html or\n    # Sec-Fetch-Dest: document) fall through to the SPA\
    \ shell so paths\n    # like /npu-eval/rngd or /mp-exam/123 still load the React\
    \ app.\n    location ~* ^/(comparison|files|gpu-sweep|loki|mm-exam|mm-exam-result|mp-exam|mp-exam-result|npu-eval|realtime|version)(/.*)?$\
    \ {\n        # Stash regex captures BEFORE any if{}: nginx clears $1/$2 even\n\
    \        # on a falsy if{} (the famous \"if is evil\" quirk).\n        set $captured_prefix\
    \ $1;\n        set $captured_suffix $2;\n\n        if ($http_sec_fetch_dest =\
    \ \"document\") {\n            rewrite ^.*$ /index.html last;\n        }\n   \
    \     if ($http_accept ~ \"^text/html\") {\n            rewrite ^.*$ /index.html\
    \ last;\n        }\n        proxy_pass http://etri-llm-backend-service.kcloud-tool.svc.cluster.local:9999/api/$captured_prefix$captured_suffix$is_args$args;\n\
    \        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n     \
    \   proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For\
    \ $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n\
    \        proxy_set_header Connection \"\";\n        proxy_buffering off;\n   \
    \     proxy_cache off;\n        proxy_read_timeout 1h;\n        proxy_send_timeout\
    \ 1h;\n        chunked_transfer_encoding off;\n    }\n\n    # Hashed, immutable\
    \ build assets. Vite fingerprints every file under\n    # /assets/ (e.g. index-BMXYfEwQ.js),\
    \ so they can be cached forever.\n    # CRITICAL: try_files ... =404 (NOT the\
    \ SPA fallback) so a request for\n    # a deleted/renamed bundle returns a real\
    \ 404 instead of index.html\n    # served as text/html \u2014 the latter white-screens\
    \ the app with a\n    # \"module MIME type\" error for any browser holding a stale\
    \ index.html\n    # after a redeploy.\n    location ^~ /assets/ {\n        try_files\
    \ $uri =404;\n        add_header Cache-Control \"public, max-age=31536000, immutable\"\
    \ always;\n        access_log off;\n    }\n\n    # SPA shell. Must always be revalidated\
    \ so a returning browser picks up\n    # the new fingerprinted asset references\
    \ after a redeploy (the shell\n    # carries an ETag, so revalidation is a cheap\
    \ 304 when unchanged).\n    # Covers direct \"/\" hits, direct /index.html hits,\
    \ and the try_files\n    # SPA fallback below \u2014 all internally redirect to\
    \ this exact location.\n    location = /index.html {\n        add_header Cache-Control\
    \ \"no-cache, must-revalidate\" always;\n        expires off;\n    }\n\n    location\
    \ / {\n        try_files $uri $uri/ /index.html;\n    }\n}\n"
