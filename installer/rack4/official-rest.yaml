apiVersion: apps/v1
kind: Deployment
metadata:
  name: etri-llm-backend
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: etri-llm-backend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: etri-llm-backend
    app.kubernetes.io/part-of: kcloud-tool
    kcloud-tool.rack4/group: official-webui
spec:
  selector:
    matchLabels:
      app: etri-llm-backend
  template:
    metadata:
      labels:
        app: etri-llm-backend
        app.kubernetes.io/instance: etri-llm-backend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: etri-llm-backend
        ports:
        - containerPort: 9999
          name: http
          protocol: TCP
        image: jungwooshim/etri-llm-backend:v61
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: IMAGE_DIGEST
          value: ''
        - name: GIT_COMMIT_SHA
          value: ''
        - name: RUNTIME_VERSIONS_JSON
          value: '{}'
        - name: RESULT_SCHEMA_VERSION
          value: v3
        envFrom:
        - secretRef:
            name: etri-llm-backend
        imagePullPolicy: Always
        volumeMounts:
        - name: model-volume
          mountPath: /usr/src/app/mnt/models/
        - name: dataset-volume
          mountPath: /usr/src/app/mnt/datasets/
        - name: results-volume
          mountPath: /usr/src/app/mnt/result/
        - name: cluster-config
          mountPath: /home/kcloud/etri-llm-deployments/app/config
          readOnly: true
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-nfs-pvc
      - name: dataset-volume
        persistentVolumeClaim:
          claimName: dataset-nfs-pvc
      - name: results-volume
        persistentVolumeClaim:
          claimName: results-nfs-pvc
      - name: cluster-config
        configMap:
          name: etri-llm-cluster-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etri-llm-frontend
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: etri-llm-frontend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: etri-llm-frontend
    app.kubernetes.io/part-of: kcloud-tool
    kcloud-tool.rack4/group: official-webui
spec:
  selector:
    matchLabels:
      app: etri-llm-frontend
  template:
    metadata:
      labels:
        app: etri-llm-frontend
        app.kubernetes.io/instance: etri-llm-frontend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: etri-llm-frontend
        ports:
        - containerPort: 5173
          name: http
          protocol: TCP
        image: jungwooshim/etri-llm-frontend:v69
        envFrom:
        - secretRef:
            name: etri-llm-frontend
        imagePullPolicy: Always
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-conf
        configMap:
          name: etri-llm-frontend-nginx-conf
          items:
          - key: default.conf
            path: default.conf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etri-llm-api
  namespace: kcloud-tool
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: etri-llm-api
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/instance: etri-llm-api
    app.kubernetes.io/part-of: kcloud-tool
    kcloud-tool.rack4/group: official-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etri-llm-api
