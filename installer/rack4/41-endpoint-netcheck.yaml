# B-3 — Rack4 in-cluster endpoint reachability check.
# CPU-only. Sends exactly ONE GET /v1/models (metadata; NO generation, NO NPU load).
# Reuses SA kcloud-mlperf-sa + PVC kcloud-mlperf-results (unmodified). New ConfigMap + Job only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kcloud-mlperf-netcheck-scripts
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: netcheck
data:
  netcheck.py: |
    import os, sys, json, time, urllib.request, urllib.error

    ENDPOINT = os.environ.get("ENDPOINT_URL", "http://10.254.202.114:8000")
    PATH = "/v1/models"
    TIMEOUT = float(os.environ.get("REQUEST_TIMEOUT", "5"))
    EXPECT_MODEL = os.environ.get("EXPECT_MODEL", "meta-llama/Llama-3.1-8B-Instruct")
    RESULTS_DIR = "/mnt/datasets/endpoint-netcheck"
    POD = os.environ.get("POD_NAME", "unknown")
    NODE = os.environ.get("NODE_NAME", "unknown")

    url = ENDPOINT.rstrip("/") + PATH
    out = {
        "check": "endpoint-netcheck",
        "node": NODE, "pod": POD,
        "endpoint": url,
        "method": "GET",
        "request_count": 1,
        "generation": False,
    }
    t0 = time.perf_counter()
    try:
        req = urllib.request.Request(url, headers={"Accept": "application/json"}, method="GET")
        with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
            body = resp.read(65536).decode("utf-8", "replace")
            code = resp.getcode()
        out["http_code"] = code
        out["latency_s"] = round(time.perf_counter() - t0, 4)
        out["reachable"] = (code == 200)
        try:
            parsed = json.loads(body)
            ids = [m.get("id") for m in parsed.get("data", [])]
            out["model_ids"] = ids
            out["expected_model_present"] = EXPECT_MODEL in ids
        except Exception as e:
            out["parse_error"] = repr(e)
            out["raw_body_head"] = body[:500]
    except urllib.error.HTTPError as e:
        out["reachable"] = False
        out["http_code"] = e.code
        out["error"] = "HTTPError %s" % e.code
        out["latency_s"] = round(time.perf_counter() - t0, 4)
    except Exception as e:
        out["reachable"] = False
        out["error"] = repr(e)
        out["latency_s"] = round(time.perf_counter() - t0, 4)

    try:
        os.makedirs(RESULTS_DIR, exist_ok=True)
        path = os.path.join(RESULTS_DIR, "result-%s.json" % POD)
        with open(path, "w") as f:
            json.dump(out, f, indent=2)
        out["persisted_path"] = path
        out["persisted_verified"] = os.path.exists(path)
    except Exception as e:
        out["persisted_verified"] = False
        out["persist_error"] = repr(e)

    print(json.dumps(out, indent=2))
    sys.exit(0 if out.get("reachable") else 1)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kcloud-mlperf-endpoint-netcheck
  namespace: kcloud-tool
  labels:
    app.kubernetes.io/name: kcloud-tool
    app.kubernetes.io/instance: kcloud-mlperf
    app.kubernetes.io/part-of: kcloud-tool
    app.kubernetes.io/managed-by: kcloud-tool
    app.kubernetes.io/component: netcheck
spec:
  backoffLimit: 0            # no retry
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kcloud-tool
        app.kubernetes.io/instance: kcloud-mlperf
        app.kubernetes.io/part-of: kcloud-tool
        app.kubernetes.io/managed-by: kcloud-tool
        app.kubernetes.io/component: netcheck
    spec:
      restartPolicy: Never
      serviceAccountName: kcloud-mlperf-sa      # reused, unmodified
      automountServiceAccountToken: false
      # no hostNetwork / hostPID / hostIPC / nodeName / tolerations / Service / Secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["mlt"]
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["compute1"]
            - weight: 60
              preference:
                matchExpressions:
                  - key: hardware
                    operator: NotIn
                    values: ["nvidia-gpu"]
      containers:
        - name: netcheck
          image: docker.io/library/python:3.11-slim@sha256:a3ab0b966bc4e91546a033e22093cb840908979487a9fc0e6e38295747e49ac0
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/netcheck.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ENDPOINT_URL
              value: "http://10.254.202.114:8000"
            - name: REQUEST_TIMEOUT
              value: "5"
            - name: EXPECT_MODEL
              value: "meta-llama/Llama-3.1-8B-Instruct"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: results
              mountPath: /mnt/datasets
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: kcloud-mlperf-results       # reused, unmodified
        - name: scripts
          configMap:
            name: kcloud-mlperf-netcheck-scripts   # new
        - name: tmp
          emptyDir: {}
