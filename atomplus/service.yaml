apiVersion: v1
kind: Service
metadata:
  name: vllm-atomplus
  namespace: npu
  labels:
    app: vllm-atomplus
    app.kubernetes.io/name: vllm-atomplus
    app.kubernetes.io/part-of: etri-llm
    accelerator.etri/vendor: rebellions
    accelerator.etri/family: atomplus
spec:
  # NodePort:30093 — the etri-llm-backend (v33+) is hardcoded to reach the
  # Atom+ inference server at http://10.254.202.111:30093 (see
  # NPU_INFERENCE_URLS.ATOM in server/src/npu-eval/npu-eval.service.ts).
  # Keep this aligned with that URL so re-deploys don't regress to the prior
  # "Inference server not available" connection-refused error.
  type: NodePort
  selector:
    app: vllm-atomplus
    app.kubernetes.io/part-of: etri-llm
    accelerator.etri/vendor: rebellions
    accelerator.etri/family: atomplus
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30093
      protocol: TCP
