apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-atomplus
  namespace: npu
  labels:
    app: vllm-atomplus
    app.kubernetes.io/name: vllm-atomplus
    app.kubernetes.io/part-of: etri-llm
    accelerator.etri/vendor: rebellions
    accelerator.etri/family: atomplus
spec:
  replicas: 1
  strategy:
    # Recreate, not RollingUpdate — the rebellions.ai/ATOM:2 request must hold
    # both NPUs on node5; a rolling update would deadlock on resource shortage.
    type: Recreate
  selector:
    # Match the immutable selector that was first applied to the live
    # cluster (4 labels).  Trimming any of these would require deleting and
    # recreating the Deployment, which is disruptive during demos.
    matchLabels:
      app: vllm-atomplus
      app.kubernetes.io/part-of: etri-llm
      accelerator.etri/vendor: rebellions
      accelerator.etri/family: atomplus
  template:
    metadata:
      labels:
        app: vllm-atomplus
        app.kubernetes.io/name: vllm-atomplus
        app.kubernetes.io/part-of: etri-llm
        accelerator.etri/vendor: rebellions
        accelerator.etri/family: atomplus
    spec:
      # node5 is the only node with Atom+ silicon; pin explicitly to make
      # scheduling deterministic and avoid edge cases when other nodes are
      # cordoned or the device plugin hasn't reported on a new node yet.
      nodeSelector:
        kubernetes.io/hostname: node5
      # Critical inference workload — give it the highest pod priority short
      # of system-cluster-critical so the scheduler prefers evicting other
      # pods rather than this one when the node is pressured.
      priorityClassName: system-node-critical
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: vllm-rbln
          image: ghcr.io/etri-llm/vllm-rbln-atomplus:0.9.3-llama3.1-8b
          # Falls back gracefully whether the image was pulled from GHCR or
          # imported into containerd via `ctr images import` (see Dockerfile
          # comment).  Keeping IfNotPresent works for both flows.
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vllm-atomplus-config
          env:
            # The vllm-rbln-atomplus:0.9.3 image ships without g++, so vLLM's
            # default torch.compile/inductor backend explodes with
            # InvalidCxxCompiler the moment EngineCore starts.  We disable
            # torch.compile entirely (the .rbln model is already pre-compiled
            # on the Rebellions NPU; runtime compilation is dead weight).
            - name: TORCH_COMPILE_DISABLE
              value: "1"
            - name: TORCHDYNAMO_DISABLE
              value: "1"
            - name: VLLM_USE_PRECOMPILED
              value: "1"
          # Override the image entrypoint to append --enforce-eager.  The
          # bundled entrypoint.sh (see /usr/local/bin/entrypoint.sh in the
          # image) does not accept extra args, and the RBLN platform plugin
          # otherwise forces compilation_config.level=3.  Together with the
          # env vars above this guarantees no inductor/g++ invocation.
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              MODEL_PATH="${MODEL_PATH:-/models/llama3.1-8b-rbln}"
              SERVED_MODEL_NAME="${SERVED_MODEL_NAME:-rebellions/Llama-3.1-8B-Instruct}"
              MAX_NUM_SEQS="${MAX_NUM_SEQS:-1}"
              MAX_NUM_BATCHED_TOKENS="${MAX_NUM_BATCHED_TOKENS:-8192}"
              MAX_MODEL_LEN="${MAX_MODEL_LEN:-8192}"
              BLOCK_SIZE="${BLOCK_SIZE:-8192}"
              PORT="${PORT:-8000}"
              HOST="${HOST:-0.0.0.0}"
              [[ -d "$MODEL_PATH" ]] || { echo "[wrap] FATAL: MODEL_PATH=$MODEL_PATH missing" >&2; exit 64; }
              [[ -f "$MODEL_PATH/prefill.rbln" ]] || { echo "[wrap] FATAL: prefill.rbln missing" >&2; exit 65; }
              echo "[wrap] starting vllm-rbln serve (enforce-eager, compile disabled)"
              exec vllm serve "$MODEL_PATH" \
                --max-num-seqs "$MAX_NUM_SEQS" \
                --max-num-batched-tokens "$MAX_NUM_BATCHED_TOKENS" \
                --max-model-len "$MAX_MODEL_LEN" \
                --block-size "$BLOCK_SIZE" \
                --port "$PORT" \
                --host "$HOST" \
                --served-model-name "$SERVED_MODEL_NAME" \
                --enforce-eager
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            # Guaranteed QoS: requests == limits.  Both Atom+ NPUs allocated
            # via the rbln-device-plugin DaemonSet running in rbln-system.
            requests:
              cpu: "8"
              memory: "32Gi"
              rebellions.ai/ATOM: 2
            limits:
              cpu: "16"
              memory: "64Gi"
              rebellions.ai/ATOM: 2
          startupProbe:
            # vllm-rbln spends ~3-5 minutes loading the .rbln binaries onto
            # both NPUs at boot.  Allow up to 10 minutes (60 * 10s) before
            # liveness kicks in.
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: model
              mountPath: /models/llama3.1-8b-rbln
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
            # The vllm-rbln-atomplus:0.9.3 image is missing the tzdata corpus
            # (no /usr/share/zoneinfo/tzdata.zi or zone1970.tab), which makes
            # pandas->pytz module import crash at startup before any inference
            # code runs.  Overlay node5's /usr/share/zoneinfo (Ubuntu 22.04
            # ships full tzdata) directly into the container.
            - name: host-zoneinfo
              mountPath: /usr/share/zoneinfo
              readOnly: true
      volumes:
        - name: model
          # The compiled rbln model lives on the cluster NFS (10.254.184.195)
          # and is auto-mounted on node5 at /mnt/models.  Using hostPath keeps
          # this manifest self-contained; once Lane B (WS-N5) lands a PV/PVC
          # for /mnt/models, swap this for a PVC reference.
          hostPath:
            path: /mnt/models/atom_quant_bench/Llama-3.1-8B-Instruct-rbln-fp32-tp2-dev01
            type: Directory
        - name: dshm
          # vllm uses shared memory for inter-process tensor passing between
          # EngineCore and the API server.  Default /dev/shm in containers is
          # 64Mi which is too small.
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: host-zoneinfo
          hostPath:
            path: /usr/share/zoneinfo
            type: Directory
