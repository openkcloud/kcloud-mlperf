syntax = "proto3";
import "google/protobuf/empty.proto";
option go_package = "/pb";

message CreateExamReq {
    string id = 1;
    string benchmark = 2;
    ExamResource resource = 3;
    ExamScenario scenario = 4;
    ExamSettings settings = 5;
}

message ExamSettings {
    string n_train = 1;
    string model_name = 2;
    string dataset_name = 3;
    string precision = 4;
    string max_test_samples = 5;
    string framework = 6;
    string selected_subjects = 7;
    string gpu_util = 8;
    string batch_size = 9;
    string total_sample_count = 10;
    string mode = 11;
    string scenario = 12;
    string server_target_qps = 13;
    string num_workers = 14;
    string min_duration = 15;
    string tensor_parallel_size = 16;
    string extra_arg = 17;
}

message ExamResource {
    int32 cpu = 1;
    string gpu_model = 2;
    int32 gpu_count = 3;
    int32 memory = 4;
}

message ExamScenario {
    string start_time = 1;
    int32 repeat_count = 2;
}

message CreateExamRes {
    string message = 1;
}

message GetExamStatusReq {
    string id = 1;
    string benchmark = 2;
}

message GetExamStatusRes {
    string status = 1;
    string message = 2;
    string current_repeat_count = 3;
}

message DeleteExamReq {
    string id = 1;
    string benchmark = 2;
}

message DeleteExamRes {
    string message = 1;
}

message UpdateExamStartTimeReq {
    string id = 1;
    string benchmark = 2;
    string start_time = 3;
}

message UpdateExamStartTimeRes {
    string message = 1;
}

message GetAvailableGPUsRes {
    repeated GPUInfo gpus = 1;
}

message GPUInfo {
    string gpu_model = 1;
    int32 gpu_count = 2;
}

service ExamService {
    rpc CreateExam (CreateExamReq) returns (CreateExamRes) {}
    rpc GetExamStatus (GetExamStatusReq) returns (GetExamStatusRes) {}
    rpc DeleteExam (DeleteExamReq) returns (DeleteExamRes) {}
    rpc UpdateExamStartTime (UpdateExamStartTimeReq) returns (UpdateExamStartTimeRes) {}
    rpc GetAvailableGPUs (google.protobuf.Empty) returns (GetAvailableGPUsRes) {}
}