{{- with .Values }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .components.etriLLMOperator.metadata.name }}
  namespace: {{ .global.namespace }} 
type: Opaque
stringData:
    WATCH_NAMESPACE: {{ .global.namespace }}
    MODEL_DATA_PVC_NAME: "model-nfs-pvc"
    DATASET_PVC_NAME: "dataset-nfs-pvc"
    RESULT_PVC_NAME: "results-nfs-pvc"
{{- end }}

---
{{- with .Values }}
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: {{ .components.etriLLMOperator.metadata.name }}-sa-token
  namespace: {{ .global.namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ .components.etriLLMOperator.metadata.name }}
{{- end }}

