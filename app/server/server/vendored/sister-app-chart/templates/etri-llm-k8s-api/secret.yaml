{{- with .Values }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .components.etriLLMAPI.metadata.name }}
  namespace: {{ .global.namespace }} 
type: Opaque
stringData:
    ADDRESS: {{ .components.etriLLMAPI.secret.address | quote }}
    PORT: {{ .components.etriLLMAPI.containers.containerPort | quote }}
    LOG_LEVEL: {{ .components.etriLLMAPI.secret.logLevel | quote }}
    LOG_FILE_DIRPATH: {{ .components.etriLLMAPI.secret.logFileDirPath | quote }}
    LOG_MAX_SIZE: {{ .components.etriLLMAPI.secret.logMaxSize | quote }}
    LOG_MAX_AGE: {{ .components.etriLLMAPI.secret.logMaxAge | quote }}
    LOKI_ADDR: {{ .components.etriLLMAPI.secret.lokiAddr | quote }}
    NAMESPACE: {{ .global.namespace | quote }}
    
{{- end }}