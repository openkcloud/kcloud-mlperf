# FuriosaAI RNGD NPU Inference Service Template
# Creates DNS entry for benchmark job to connect to inference pod
apiVersion: v1
kind: Service
metadata:
  name: npu-inference-{{EXAM_ID}}
  namespace: llm-evaluation
  labels:
    app: npu-inference
    exam-id: "{{EXAM_ID}}"
spec:
  selector:
    app: npu-inference
    exam-id: "{{EXAM_ID}}"
  ports:
    - port: 8000
      targetPort: 8000
      name: http
