version: "3.9"

services:
  backend:
    container_name: nestjs_prod
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    ports:
      - "9999:9999"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    container_name: react_prod
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: postgres_prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - ./data/db:/var/lib/postgresql/data

volumes:
  postgres_data_prod:
