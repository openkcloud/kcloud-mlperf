# cert-manager Issuer + Certificate for the Kyverno admission webhook.
#
# Kyverno can manage its own self-signed CA, but per WS-D01a-ALT acceptance
# criteria we configure cert-manager so the webhook TLS pair is rotated
# automatically and observable via Certificate resources.
#
# Prerequisites:
#   * cert-manager v1.13+ installed cluster-wide
#     (see README "Prerequisites" section)
#
# Apply order: 1) cert-issuer.yaml -> 2) Helm install Kyverno with
# the values referenced here -> 3) rbac.yaml -> 4) kyverno-policy.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    # Skip Kyverno's own pods so they cannot mutate themselves and create
    # an admission loop on cold start.
    admission.kyverno.io/excluded: "true"
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kyverno-selfsigned-issuer
  namespace: kyverno
spec:
  selfSigned: {}
---
# Root CA used to issue the leaf cert below.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kyverno-ca
  namespace: kyverno
spec:
  isCA: true
  commonName: kyverno-ca
  secretName: kyverno-ca-tls
  duration: 8760h    # 1 year
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: kyverno-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
---
# CA-backed Issuer used to mint webhook serving certs.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kyverno-ca-issuer
  namespace: kyverno
spec:
  ca:
    secretName: kyverno-ca-tls
---
# Leaf certificate served by the Kyverno admission webhook pod(s).
# DNS names cover the in-cluster Service plus the legacy hostname Kyverno
# uses for its admission server.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kyverno-svc-tls
  namespace: kyverno
spec:
  secretName: kyverno-svc-tls
  duration: 2160h    # 90 days
  renewBefore: 360h  # 15 days
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - kyverno-svc
    - kyverno-svc.kyverno
    - kyverno-svc.kyverno.svc
    - kyverno-svc.kyverno.svc.cluster.local
  issuerRef:
    name: kyverno-ca-issuer
    kind: Issuer
    group: cert-manager.io
