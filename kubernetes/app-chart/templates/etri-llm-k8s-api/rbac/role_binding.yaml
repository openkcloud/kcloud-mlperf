{{- with .Values }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: etri-llm-api
    app.kubernetes.io/managed-by: kustomize
  name: etri-llm-api-rolebinding  
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etri-llm-api-role
subjects:
- kind: ServiceAccount
  name: {{ .components.etriLLMAPI.metadata.name }}
  namespace: {{ .global.namespace }}
{{- end }}
