apiVersion: v1
kind: PersistentVolume
metadata:
  name: model-nfs-pv
  namespace: llm-evaluation
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.254.184.195
    path: /mnt/models
