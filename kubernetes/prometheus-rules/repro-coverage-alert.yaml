apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: repro-coverage-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: reproducibility.coverage
      interval: 1m
      rules:
        - alert: ReproducibilityCoverageBelowThreshold
          # Fire when fewer than 99% of exam rows across all types have all
          # 11 reproducibility metadata columns non-null. Guards against
          # silent metadata regression where new rows are created without
          # the full provenance captured.
          expr: >
            (
              sum(reproducibility_columns_complete{exam_type=~"mp|mm|npu"})
              /
              sum(reproducibility_columns_total{exam_type=~"mp|mm|npu"})
            ) * 100 < 99
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Reproducibility metadata coverage below 99%"
            description: >
              Only {{ $value | printf "%.1f" }}% of exam rows have all 11
              reproducibility metadata columns non-null (threshold: 99%).
              Check that the backend is correctly wiring env vars
              (GIT_COMMIT_SHA, IMAGE_DIGEST, POD_NAME, NODE_NAME,
              RUNTIME_VERSIONS_JSON, RESULT_SCHEMA_VERSION) and that the
              seed_value field is being populated by WS-D03.
            runbook_url: "https://github.com/etri-llm/docs/blob/main/runbooks/reproducibility-coverage.md"
